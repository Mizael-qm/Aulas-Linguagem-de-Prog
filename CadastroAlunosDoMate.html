<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 📚 Sistema escolar</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #1f4037, #99f2c8);
        }

        .titulo {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .titulo h1 {
            font-size: 26px;
            color: #1e293b;
        }

        .titulo p {
            color: #64748b;
            margin-top: 5px;
        }

        .menu {
            background-color: var(--soft-blue);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 40px;
            height: 60px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .menu-esquerda {
            flex: 1;
            display: flex;
            align-items: center;
            color: var(--white);
            font-weight: bold;
            font-size: 1.2rem;
        }

        .menu-esquerda::before {
            content: "🏫 ";
        }

        .menu-centro {
            flex: 2;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        .menu-centro span {
            color: #cbd5e0;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 8px 12px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-centro span:hover {
            color: var(--white);
            background-color: rgba(52, 152, 219, 0.2);
        }

        .menu-direita {
            flex: 1;
            display: flex;
            justify-content: flex-end;
        }

        .menu-direita span {
            background-color: var(--accent-blue);
            color: var(--white);
            padding: 8px 25px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .menu-direita span:hover {
            background-color: #2980b9;
        }


        .pagina {
            background: #ffffff;
            width: 380px;
            padding: 35px 30px;
            border-radius: 20px;
            margin: 25px auto;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.08);
            transition: 0.3s;
            display: none;
        }
        .pagina-ativa{
            display: block;
        }
        .pagina input {
            width: 100%;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-size: 14px;
            transition: all 0.25s ease;
        }

        .pagina input::placeholder {
            color: #94a3b8;
        }

        .cadastrar {
            display: block;
            margin-top: 30px;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.25s;
            margin: auto;
        }

        .cadastrar:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.25);
        }

        .resultado {
            display: none;
            background: white;
            width: 520px;
            margin: 25px auto;
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            line-height: 1.6;
            color: #1e293b;
        }

        .resultado h2 {
            margin-bottom: 10px;
            font-size: 20px;
        }
        .menu span{cursor: pointer;}

        @media (max-width: 600px) {

            .formulario,
            .resultado {
                width: 90%;
            }
        }
    </style>
</head>

<body>

        <div class="menu-esquerda">EEB DOM JAIME</div>
        <div class="menu-centro">
            <span>Início</span>
            <span onclick="navegar('alunos')">Alunos</span>
            <span onclick = "navegar('professores')">Professores</span>
            <span onclick="navegar('funcionarios')">Funcionários</span>
        </div>
        <div class="menu-direita">
            <span>Login</span>
        </div>
    </div>

    <div id="alunos" class="pagina pagina-ativa">
